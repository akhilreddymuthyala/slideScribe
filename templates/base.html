<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SlideScribe{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="ss-body">

  {% if messages %}
  <div class="ss-messages" id="ss-messages">
    {% for message in messages %}
    <div class="ss-message ss-message--{{ message.tags }}">
      <span>{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="ss-message-close">✕</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
